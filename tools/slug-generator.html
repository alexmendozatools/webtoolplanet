<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Slug Generator</title>
<link rel="stylesheet" href="/style.css">
</head>

<body>

<header class="header">
<div class="logo">🪐 WebToolPlanet</div>
<nav>
<ul class="menu">
<li><a href="/">Home</a></li>
<li><a href="/tools.html">Tools</a></li>
</ul>
</nav>
</header>

<section class="hero">

<h1>Slug Generator</h1>

<input id="text" placeholder="Enter title">

<br><br>

<button onclick="generate()">Generate Slug</button>

<p id="result"></p>

</section>

<script>

function generate(){

let text=document.getElementById("text").value;

let slug=text.toLowerCase().replace(/\s+/g,"-");

document.getElementById("result").innerText=slug;

}

</script>

</body>
</html>
