<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Markdown Preview</title>
<link rel="stylesheet" href="/style.css">
</head>

<body>

<header class="header">
<div class="logo">🪐 WebToolPlanet</div>
<nav>
<ul class="menu">
<li><a href="/">Home</a></li>
<li><a href="/tools.html">Tools</a></li>
</ul>
</nav>
</header>

<section class="hero">

<h1>Markdown Preview</h1>

<textarea id="md" style="width:80%;height:150px;"></textarea>

<br><br>

<button onclick="preview()">Preview</button>

<div id="output"></div>

</section>

<script>

function preview(){

let text=document.getElementById("md").value;

let html=text
.replace(/^# (.*$)/gim,"<h1>$1</h1>")
.replace(/^## (.*$)/gim,"<h2>$1</h2>")
.replace(/\*\*(.*)\*\*/gim,"<b>$1</b>");

document.getElementById("output").innerHTML=html;

}

</script>

</body>
</html>
