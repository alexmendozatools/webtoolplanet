<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Timestamp Converter</title>
<link rel="stylesheet" href="/style.css">
</head>

<body>

<header class="header">
<div class="logo">🪐 WebToolPlanet</div>
<nav>
<ul class="menu">
<li><a href="/">Home</a></li>
<li><a href="/tools.html">Tools</a></li>
</ul>
</nav>
</header>

<section class="hero">

<h1>Timestamp Converter</h1>

<input id="ts" placeholder="Enter timestamp">

<br><br>

<button onclick="convert()">Convert</button>

<p id="result"></p>

</section>

<script>

function convert(){

let ts=document.getElementById("ts").value;

let date=new Date(ts*1000);

document.getElementById("result").innerText=date;

}

</script>

</body>
</html>
