<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Character Counter | WebToolPlanet</title>
<link rel="stylesheet" href="/style.css">
</head>

<body>

<header class="header">
<div class="logo">🪐 WebToolPlanet</div>
<nav>
<ul class="menu">
<li><a href="/">Home</a></li>
<li><a href="/tools.html">Tools</a></li>
</ul>
</nav>
</header>

<section class="hero">

<h1>Character Counter</h1>

<textarea id="text" style="width:80%;height:150px;"></textarea>

<br><br>

<button onclick="count()">Count</button>

<p id="result"></p>

</section>

<script>

function count(){

let text=document.getElementById("text").value;

document.getElementById("result").innerText=
"Characters: "+text.length;

}

</script>

</body>
</html>
