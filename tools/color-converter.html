<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HEX to RGB</title>
<link rel="stylesheet" href="/style.css">
</head>

<body>

<header class="header">
<div class="logo">🪐 WebToolPlanet</div>
<nav>
<ul class="menu">
<li><a href="/">Home</a></li>
<li><a href="/tools.html">Tools</a></li>
</ul>
</nav>
</header>

<section class="hero">

<h1>HEX to RGB Converter</h1>

<input id="hex" placeholder="#ffffff">

<br><br>

<button onclick="convert()">Convert</button>

<p id="result"></p>

</section>

<script>

function convert(){

let hex=document.getElementById("hex").value.replace("#","");

let r=parseInt(hex.substring(0,2),16);
let g=parseInt(hex.substring(2,4),16);
let b=parseInt(hex.substring(4,6),16);

document.getElementById("result").innerText="RGB("+r+","+g+","+b+")";

}

</script>

</body>
</html>
