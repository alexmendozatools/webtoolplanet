<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

</head>

<body>

<header class="header">

<div class="logo">

</div>

<nav>

<ul class="menu">

<li><a href="/tools.html">Tools</a></li>

</ul>

</nav>

</header>


<section class="hero">

<h1>Word Counter</h1>

<p>Count words and characters instantly.</p>

<textarea id="text" placeholder="Type or paste text here..." style="width:80%;height:150px;padding:10px;"></textarea>

<br><br>

<button onclick="countWords()">Count</button>

<p id="result"></p>

</section>

<script>

function countWords(){

let text=document.getElementById("text").value;

let words=text.trim().split(/\s+/).filter(word => word.length>0);

let chars=text.length;

document.getElementById("result").innerHTML=
"Words: "+words.length+" | Characters: "+chars;

}

</script>

</body>

</html>
